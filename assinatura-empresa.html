<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano Empresa Premium - Setor de Arte</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --primary: #f43f5e;
            --secondary: #fb7185;
            --accent: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 800; font-size: 2rem; margin-bottom: 30px; }
        
        .plan-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            text-align: left;
            border: 2px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .badge {
            position: absolute; top: -15px; right: 20px;
            background: var(--primary); color: white;
            padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 700;
        }

        .plan-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        .plan-price { font-size: 2.5rem; font-weight: 800; margin-bottom: 25px; }
        .plan-price span { font-size: 1rem; color: var(--text-muted); font-weight: 400; }

        .features-list { list-style: none; margin-bottom: 35px; }
        .features-list li { margin-bottom: 12px; display: flex; align-items: center; gap: 10px; color: #cbd5e1; font-size: 0.95rem; }
        .features-list li i { color: #22c55e; }

        .btn-subscribe {
            width: 100%; padding: 18px; border-radius: 12px;
            border: none; background: var(--primary); color: white;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: 0.3s; font-family: 'Poppins';
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-subscribe:hover { transform: scale(1.02); background: var(--secondary); }

        .back-link { display: block; margin-top: 30px; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sua Empresa em Outro Nível!</h1>
        <div class="plan-card">
            <div class="badge">RECOMENDADO</div>
            <div class="plan-name"><i class="fas fa-building"></i> Plano Empresa</div>
            <div class="plan-price">R$ 49,90<span>/mês</span></div>
            <ul class="features-list">
                <li><i class="fas fa-check"></i> Solicitação ilimitada de artes</li>
                <li><i class="fas fa-check"></i> Dashboard de Controle Gerencial</li>
                <li><i class="fas fa-check"></i> Carteira de Crédito Pré-paga</li>
                <li><i class="fas fa-check"></i> Relatórios de Consumo e Pedidos</li>
                <li><i class="fas fa-check"></i> Suporte Prioritário</li>
            </ul>
            <button class="btn-subscribe" onclick="abrirCheckout()">Assinar Agora</button>
        </div>
        <a href="/dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao Painel</a>
    </div>

    <script>
        function abrirCheckout() {
            alert("Redirecionando para o Checkout Asaas...");
            // Em breve: window.location.href = '/api/asaas/create-checkout?type=EMPRESA';
        }
    </script>
</body>
</html>
