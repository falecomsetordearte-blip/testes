<!-- components/header.html -->
<style>
    /* Estilos do Header */
    .app-header {
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        height: 70px;
        position: sticky;
        top: 0;
        z-index: 900;
        padding: 0 30px;
        display: flex;
        align-items: center;
        box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    .header-content {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 100%;
        margin: 0 auto;
    }

    /* ESTILO DO GATILHO DE BUSCA (Botão que parece input) */
    .search-trigger-box {
        background: #f1f5f9;
        border-radius: 8px;
        padding: 0 15px;
        height: 45px;
        display: flex;
        align-items: center;
        width: 400px;
        max-width: 100%;
        cursor: pointer; /* Cursor de mãozinha para indicar clique */
        color: #94a3b8;
        border: 2px solid transparent;
        transition: 0.2s;
        user-select: none; /* Impede seleção de texto */
    }
    
    .search-trigger-box:hover {
        background: #e2e8f0;
        border-color: #cbd5e1;
        color: #475569;
    }

    .search-trigger-text {
        margin-left: 10px;
        font-size: 0.9rem;
        font-weight: 500;
    }

    /* Área do Usuário */
    .user-menu {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    
    /* ── Sininho de Notificações ─────────────────────────────── */
    .notif-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .notification-btn {
        background: none;
        border: none;
        font-size: 1.2rem;
        color: #64748b;
        cursor: pointer;
        padding: 8px;
        border-radius: 8px;
        transition: background 0.2s, color 0.2s;
        position: relative;
    }
    .notification-btn:hover {
        background: #f1f5f9;
        color: #4f46e5;
    }

    .notif-badge {
        position: absolute;
        top: 2px;
        right: 2px;
        background: #ef4444;
        color: white;
        font-size: 0.6rem;
        font-weight: 800;
        min-width: 16px;
        height: 16px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 3px;
        pointer-events: none;
        border: 2px solid white;
    }
    .notif-badge.hidden { display: none; }

    .notif-dropdown {
        display: none;
        position: absolute;
        top: calc(100% + 10px);
        right: 0;
        width: 360px;
        max-width: 95vw;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        z-index: 9999;
        overflow: hidden;
        animation: notifFadeIn 0.2s ease;
    }
    .notif-dropdown.open { display: block; }

    @keyframes notifFadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .notif-dropdown-header {
        padding: 16px 20px 12px;
        border-bottom: 1px solid #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .notif-dropdown-header h4 {
        font-size: 0.9rem;
        font-weight: 700;
        color: #1e293b;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .notif-dropdown-header h4 i { color: #4f46e5; }

    .notif-list {
        max-height: 380px;
        overflow-y: auto;
    }
    .notif-list::-webkit-scrollbar { width: 4px; }
    .notif-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

    .notif-item {
        padding: 14px 20px;
        border-bottom: 1px solid #f8fafc;
        transition: background 0.15s;
    }
    .notif-item:hover { background: #fafbff; }
    .notif-item:last-child { border-bottom: none; }

    .notif-item-title {
        font-weight: 700;
        font-size: 0.85rem;
        color: #1e293b;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .notif-item-title .dot {
        width: 7px; height: 7px;
        background: #4f46e5;
        border-radius: 50%;
        flex-shrink: 0;
    }
    .notif-item-msg {
        font-size: 0.82rem;
        color: #64748b;
        line-height: 1.5;
        margin-bottom: 6px;
    }
    .notif-item-link {
        font-size: 0.8rem;
        font-weight: 600;
        color: #4f46e5;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }
    .notif-item-link:hover { text-decoration: underline; }

    .notif-empty {
        padding: 30px 20px;
        text-align: center;
        color: #94a3b8;
        font-size: 0.85rem;
    }
    .notif-empty i { font-size: 1.8rem; display: block; margin-bottom: 8px; color: #cbd5e1; }

    #logout-button {
        padding: 8px 16px;
        border: 1px solid #e2e8f0;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        color: #64748b;
        transition: 0.2s;
    }
    #logout-button:hover {
        background: #f1f5f9;
        color: #ef4444;
        border-color: #ef4444;
    }
</style>

<header class="app-header">
    <div class="header-content">
        <!-- Espaço para logo se necessário -->
        <div class="logo-area" style="width: 20px;"></div>

        <!-- GATILHO DA BUSCA GLOBAL -->
        <div class="search-trigger-box" id="btn-open-search">
            <i class="fas fa-search"></i>
            <span class="search-trigger-text">Pesquisar pedido ou cliente... (Ctrl + K)</span>
        </div>

        <!-- Menu Usuário -->
        <div class="user-menu">

            <!-- ── SININHO ──────────────────────────────────── -->
            <div class="notif-wrapper" id="notif-wrapper">
                <button class="notification-btn" id="btn-notif-bell" title="Notificações" aria-label="Notificações">
                    <i class="fas fa-bell"></i>
                    <span class="notif-badge hidden" id="notif-badge">0</span>
                </button>

                <div class="notif-dropdown" id="notif-dropdown">
                    <div class="notif-dropdown-header">
                        <h4><i class="fas fa-bell"></i> Notificações</h4>
                    </div>
                    <div class="notif-list" id="notif-list">
                        <div class="notif-empty">
                            <i class="fas fa-bell-slash"></i>
                            Nenhuma notificação no momento.
                        </div>
                    </div>
                </div>
            </div>
            <!-- ──────────────────────────────────────────────── -->

            <div style="text-align:right; line-height:1.2;">
                <span id="user-greeting" style="display:block; font-weight:600; color:#334155; font-size:0.9rem;">Olá!</span>
                <span style="font-size:0.75rem; color:#94a3b8;">Setor de Arte</span>
            </div>

            <button id="logout-button">Sair</button>
        </div>
    </div>
</header>
