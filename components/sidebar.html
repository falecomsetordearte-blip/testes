<!-- components/sidebar.html -->
<style>
    /* Estilos Gerais da Sidebar */
    .app-sidebar {
        background-color: #3a5262;
        /* Cor de fundo decidida */
        color: #ffffff;
    }

    /* Links da sidebar */
    .app-sidebar a {
        color: #ffffff;
        text-decoration: none;
    }

    /* Container do cabeçalho */
    .sidebar-header {
        text-align: center;
        padding: 1rem 0;
        background: transparent !important;
    }

    /* Garante que o link em volta da logo não tenha fundo ou borda */
    .logo-link {
        display: block;
        background: transparent !important;
        border: none !important;
    }

    /* 
       Estilo da Logo
       - Tamanho reduzido para 150px
       - Filtros e máscaras removidos
    */
    .sidebar-logo {
        width: 150px;
        /* Reduzido de 200px para 150px */
        max-width: 100%;
        height: auto !important;
        object-fit: contain;

        /* --- BLOCO DE CORREÇÃO DA MÁSCARA BRANCA --- */
        filter: none !important;
        -webkit-filter: none !important;
        mask: none !important;
        -webkit-mask: none !important;
        mix-blend-mode: normal !important;
        opacity: 1 !important;
        /* ------------------------------------------- */

        /* Resets visuais */
        background: transparent !important;
        border: none !important;
        padding: 0 !important;
        margin: 0 auto !important;
        box-shadow: none !important;
        border-radius: 0 !important;

        display: block;
    }

    /* Submenu Styles */
    .app-sidebar .has-submenu > a {
        display: flex;
        align-items: center;
    }
    .app-sidebar .submenu {
        display: none;
        list-style: none;
        padding: 0;
        margin: 0;
        background-color: rgba(0, 0, 0, 0.15); /* Fundo um pouco mais escuro para diferenciar */
    }
    .app-sidebar .submenu li a {
        padding-top: 0.8rem;
        padding-bottom: 0.8rem;
        padding-left: 3.5rem !important;
        font-size: 0.9em;
        opacity: 0.9;
    }
    .app-sidebar .submenu li a:hover {
        opacity: 1;
        background-color: rgba(255, 255, 255, 0.05);
    }
    .app-sidebar .has-submenu .chevron {
        margin-left: auto;
        margin-right: 15px;
        transition: transform 0.3s ease;
        font-size: 0.8em;
    }
    .app-sidebar .has-submenu.open .chevron {
        transform: rotate(180deg);
    }
</style>
