<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Execução</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

.container{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
    gap:10px;
}

.item{
    background:white;
    padding:12px;
    border-radius:8px;
    box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

.executado{
    text-decoration: line-through;
    color:gray;
}
</style>
</head>

<body>

<h1>Checklist de Execução</h1>

<div class="container" id="lista"></div>

<script>

const itens = [
"01_Familia_Brioschi",
"02_Familia_Busato",
"03_Cachaca_Temosinha",
"04_Cervejaria_Aurora",
"05_Fazenda_Carnielli",
"07_Produtos_AnGar",
"08_Queijaria_Ines",
"09_Sitio_Espresso_do",
"10_Varejao_das_Artes",
"11_Villa_Arcade_Artesanato",
"12_Vinicola_Tonole",
"13_Zandonade",
"14_Fiore_di_Laranja_Lima",
"15_Cantinho_Rustico",
"16_Fazenda_Saude",
"17_Bela_Aurora",
"18_Pousada_Tonoli",
"19_Casa_Nostra"
]

const lista = document.getElementById("lista")

itens.forEach(nome => {

    const estado = localStorage.getItem(nome) === "true"

    const div = document.createElement("div")
    div.className = "item"

    const label = document.createElement("label")

    const checkbox = document.createElement("input")
    checkbox.type = "checkbox"
    checkbox.checked = estado

    const span = document.createElement("span")
    span.textContent = " " + nome

    if(estado) span.classList.add("executado")

    checkbox.onchange = () => {
        localStorage.setItem(nome, checkbox.checked)
        span.classList.toggle("executado")
    }

    label.appendChild(checkbox)
    label.appendChild(span)
    div.appendChild(label)

    lista.appendChild(div)
})

</script>

</body>
</html>
