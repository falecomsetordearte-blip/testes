<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Novidades - Admin</title>
    <!-- Incluindo FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--surface);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        }

        h2 { margin-bottom: 20px; font-size: 1.5rem; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        h2 i { color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-main); }
        
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            font-size: 1rem;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button.btn { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button.btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button.btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-item {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: #fff;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .history-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }
        .history-item.info::before { background-color: var(--primary); }
        .history-item.alerta::before { background-color: var(--warning); }
        .history-item.erro::before { background-color: var(--danger); }
        .history-item.inativa { opacity: 0.6; filter: grayscale(1); }

        .history-content h4 { margin-bottom: 5px; font-size: 1.1rem; }
        .history-content p { font-size: 0.9rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
        
        .badges-row { display: flex; gap: 8px; align-items: center; }
        .badge { font-size: 0.75rem; font-weight: 600; padding: 4px 8px; border-radius: 999px; }
        .badge-status.ativa { background: #dcfce7; color: #166534; }
        .badge-status.inativa { background: #f1f5f9; color: #475569; }
        .badge-date { color: var(--text-muted); font-size: 0.8rem; font-weight: normal; }

        .toggle-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .toggle-btn:hover { background: var(--bg); }
        
        .empty-state { text-align: center; color: var(--text-muted); padding: 30px 10px; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Coluna Formulário -->
        <div class="card">
            <h2><i class="fa-solid fa-bullhorn"></i> Lançar Nova "Novidade"</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.95rem;">
                A nova mensagem aparecerá como um pop-up central para todos os usuários assim que acessarem o painel.
            </p>
            
            <form id="admin-form">
                <div class="form-group">
                    <label>Título da Novidade</label>
                    <input type="text" id="titulo" required placeholder="Ex: Nova Funcionalidade Liberada!">
                </div>
                
                <div class="form-group">
                    <label>Mensagem / Detalhes</label>
                    <textarea id="mensagem" rows="5" required placeholder="Escreva aqui as novidades..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Tipo Visual</label>
                    <select id="tipo">
                        <option value="info">🎉 Novidade / Informação (Azul)</option>
                        <option value="alerta">⚠️ Alerta / Atenção (Amarelo)</option>
                        <option value="erro">🚨 Urgente / Erro (Vermelho)</option>
                    </select>
                </div>



                <button type="submit" class="btn">
                    <i class="fa-solid fa-paper-plane"></i> PUBLICAR PARA TODOS
                </button>
            </form>
        </div>

        <!-- Coluna Histórico -->
        <div class="card">
            <h2><i class="fa-solid fa-clock-rotate-left"></i> Histórico de Lançamentos</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.95rem;">
                Veja as notificações lançadas. Desative as que não são mais relevantes para poupar novos usuários de visualizá-las.
            </p>

            <div class="history-list" id="history-container">
                <div class="empty-state">Carregando histórico...</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadHistory);

        document.getElementById('admin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Publicando...';
            
            const data = {
                titulo: document.getElementById('titulo').value,
                mensagem: document.getElementById('mensagem').value,
                tipo: document.getElementById('tipo').value
            };

            try {
                const res = await fetch('/api/createGlobalNotification', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert("Notificação publicada com sucesso! Ela irá aparecer como pop-up para todos.");
                    e.target.reset();
                    loadHistory();
                } else {
                    const errStr = await res.json();
                    alert("Erro: " + (errStr.message || "Falha na requisição"));
                }
            } catch (error) {
                alert("Erro de conexão.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        async function loadHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i> Carregando...</div>';
            
            try {
                // Passa admin=true para pegar inativas também (requer que a API suporte, adaptamos lá já)
                const res = await fetch('/api/getGlobalNotifications?admin=true');
                if (!res.ok) throw new Error("Erro na API");
                const list = await res.json();
                
                if (list.length === 0) {
                    container.innerHTML = '<div class="empty-state">Nenhuma notificação registrada ainda.</div>';
                    return;
                }

                container.innerHTML = list.map(item => `
                    <div class="history-item ${item.tipo || 'info'} ${!item.ativa ? 'inativa' : ''}">
                        <div class="history-content">
                            <h4>${item.titulo}</h4>
                            <p>${item.mensagem}</p>
                            <div class="badges-row">
                                <span class="badge badge-status ${item.ativa ? 'ativa' : 'inativa'}">
                                    ${item.ativa ? 'Ativa' : 'Desativada'}
                                </span>
                                <span class="badge-date">Lançado em: ${new Date(item.criado_em).toLocaleString('pt-BR')}</span>
                            </div>
                        </div>
                        <button class="toggle-btn" onclick="toggleStatus(${item.id}, ${!item.ativa})" title="${item.ativa ? 'Desativar notificação' : 'Ativar notificação'}">
                            <i class="fa-solid ${item.ativa ? 'fa-eye-slash' : 'fa-eye'}"></i>
                        </button>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = '<div class="empty-state" style="color:var(--danger)">Erro ao carregar histórico.</div>';
            }
        }

        async function toggleStatus(id, makeActive) {
            try {
                const res = await fetch('/api/toggleGlobalNotification', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id, ativa: makeActive })
                });

                if (res.ok) {
                    loadHistory();
                } else {
                    const err = await res.json();
                    alert("Erro: " + (err.message || 'Falha ao alterar'));
                }
            } catch(e) {
                alert("Erro de conexão");
            }
        }
    </script>
</body>
</html>
