<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Clientes - Setor de Arte</title>
    <!-- Google Fonts e FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Global -->
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .clientes-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .clientes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .clientes-header h1 {
            font-size: 1.8rem;
            color: #1e293b;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
        }

        .search-box button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-box button:hover {
            background: #4338ca;
        }

        /* GRID DE CLIENTES */
        .clientes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .cliente-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid #f1f5f9;
            position: relative;
        }

        .cliente-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #e2e8f0;
        }

        .cliente-icon {
            width: 45px;
            height: 45px;
            background: #e0e7ff;
            color: #4f46e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .cliente-nome {
            font-size: 1.15rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cliente-info {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cliente-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #e2e8f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0f172a;
        }

        .stat-value.money {
            color: #10b981;
        }

        .wpp-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.2s;
            font-size: 1.1rem;
        }

        .wpp-btn:hover {
            background: #1ebc59;
            transform: scale(1.1);
        }

        /* MODAL DE DETALHES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.4rem;
            color: #1e293b;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-close:hover {
            color: #ef4444;
        }

        .modal-body {
            padding: 25px;
            overflow-y: auto;
        }

        .historico-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .pedido-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pedido-info {
            flex: 1;
            min-width: 250px;
        }

        .pedido-titulo {
            font-weight: 600;
            color: #334155;
            margin-bottom: 3px;
        }

        .pedido-data {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .pedido-etapa {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #e0e7ff;
            color: #4f46e5;
            white-space: nowrap;
        }

        .pedido-valor {
            font-weight: 700;
            color: #10b981;
            font-size: 1.1rem;
        }

        /* Esqueleto de Loading */
        .skeleton {
            background: #f1f5f9;
            border-radius: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

    </style>
</head>
<body>
    <div class="app-layout-grid">
        <div id="sidebar-placeholder"></div>

        <div class="main-content-area">
            <div id="header-placeholder"></div>

            <div class="clientes-container">
                <div class="clientes-header">
                    <h1><i class="fas fa-users" style="color: #4f46e5;"></i> Meus Clientes</h1>
                    
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Buscar por nome ou WhatsApp...">
                        <button onclick="buscarClientes()"><i class="fas fa-search"></i></button>
                    </div>
                </div>

                <div class="clientes-grid" id="clientes-grid">
                    <!-- Cards de clientes injetados aqui -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Detalhes -->
    <div class="modal-overlay" id="modal-detalhes">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-nome-cliente">Detalhes do Cliente</h2>
                <button class="modal-close" onclick="fecharModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div style="display: flex; gap: 20px; margin-bottom: 20px; align-items: center; background: #f8fafc; padding: 15px; border-radius: 10px;">
                    <div>
                        <div style="font-size: 0.8rem; color: #64748b; font-weight: 600; text-transform: uppercase;">Contato</div>
                        <div id="modal-wpp-cliente" style="font-size: 1.1rem; font-weight: 500; color: #1e293b;">-</div>
                    </div>
                    <a href="#" id="modal-wpp-link" target="_blank" style="background: #25D366; color: white; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;"><i class="fab fa-whatsapp"></i> Conversar</a>
                </div>

                <h3 style="font-size: 1.1rem; color: #334155; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 15px;">Histórico de Pedidos</h3>
                <ul class="historico-list" id="historico-list">
                    <!-- Lista de pedidos -->
                </ul>
            </div>
        </div>
    </div>

    <script src="/layout.js"></script>
    <script src="/clientes-script.js"></script>
</body>
</html>
