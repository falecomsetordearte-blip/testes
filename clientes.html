<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Clientes - Setor de Arte</title>
    <!-- Google Fonts e FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS Global -->
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .clientes-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .clientes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .clientes-header h1 {
            font-size: 1.8rem;
            color: #1e293b;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
        }

        .search-box button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-box button:hover {
            background: #4338ca;
        }

        /* TABELA DE CLIENTES */
        .clientes-table-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .clientes-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .clientes-table thead tr {
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
        }

        .clientes-table thead th {
            padding: 14px 18px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .clientes-table tbody tr {
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: background 0.15s;
        }

        .clientes-table tbody tr:last-child {
            border-bottom: none;
        }

        .clientes-table tbody tr:hover {
            background: #f8fafc;
        }

        .clientes-table tbody td {
            padding: 14px 18px;
            color: #334155;
            vertical-align: middle;
        }

        .cliente-nome-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cliente-avatar {
            width: 38px;
            height: 38px;
            background: #e0e7ff;
            color: #4f46e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            flex-shrink: 0;
        }

        .cliente-nome-text {
            font-weight: 600;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        .wpp-cell {
            color: #64748b;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .wpp-cell i {
            color: #25D366;
        }

        .badge-pedidos {
            display: inline-block;
            background: #e0e7ff;
            color: #4f46e5;
            font-weight: 700;
            font-size: 0.82rem;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .valor-gasto {
            color: #10b981;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .tag-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .btn-add-tag {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px dashed #cbd5e1;
            background: none;
            color: #94a3b8;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-add-tag:hover {
            border-color: #4f46e5;
            color: #4f46e5;
            background: #f5f3ff;
        }

        .wpp-btn {
            background: #25D366;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.2s;
            font-size: 1rem;
        }

        .wpp-btn:hover {
            background: #1ebc59;
            transform: scale(1.1);
        }

        .skeleton-row td {
            padding: 14px 18px;
        }

        .skeleton-line {
            height: 16px;
            border-radius: 6px;
            background: #f1f5f9;
            animation: pulse 1.5s infinite;
        }

        /* MODAL DE DETALHES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.4rem;
            color: #1e293b;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-close:hover {
            color: #ef4444;
        }

        .modal-body {
            padding: 25px;
            overflow-y: auto;
        }

        .historico-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .pedido-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pedido-info {
            flex: 1;
            min-width: 250px;
        }

        .pedido-titulo {
            font-weight: 600;
            color: #334155;
            margin-bottom: 3px;
        }

        .pedido-data {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .pedido-etapa {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #e0e7ff;
            color: #4f46e5;
            white-space: nowrap;
        }

        .pedido-valor {
            font-weight: 700;
            color: #10b981;
            font-size: 1.1rem;
        }

        /* Esqueleto de Loading */
        .skeleton {
            background: #f1f5f9;
            border-radius: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

    </style>
</head>
<body>
    <div class="app-layout-grid">
        <div id="sidebar-placeholder"></div>

        <div class="main-content-area">
            <div id="header-placeholder"></div>

            <div class="clientes-container">
                <div class="clientes-header">
                    <h1><i class="fas fa-users" style="color: #4f46e5;"></i> Meus Clientes</h1>
                    
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Buscar por nome ou WhatsApp...">
                        <button onclick="buscarClientes()"><i class="fas fa-search"></i></button>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button onclick="abrirModalSegmentos()" style="background: white; color: #475569; border: 1px solid #cbd5e1; padding: 10px 15px; border-radius: 8px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                            <i class="fas fa-tags"></i> Segmentos
                        </button>
                        <button onclick="abrirModalNovoCliente()" style="background: #4f46e5; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                            <i class="fas fa-plus"></i> Novo Cliente
                        </button>
                    </div>
                </div>

                <div class="clientes-table-wrapper">
                    <table class="clientes-table">
                        <thead>
                            <tr>
                                <th><i class="fas fa-user" style="margin-right:6px;"></i>Nome</th>
                                <th><i class="fab fa-whatsapp" style="margin-right:6px;"></i>WhatsApp</th>
                                <th style="text-align:center;"><i class="fas fa-shopping-bag" style="margin-right:6px;"></i>Pedidos</th>
                                <th><i class="fas fa-tags" style="margin-right:6px;"></i>Segmentos</th>
                                <th style="text-align:right;"><i class="fas fa-dollar-sign" style="margin-right:6px;"></i>Total Gasto</th>
                                <th style="text-align:center;"><i class="fas fa-ellipsis-h"></i></th>
                            </tr>
                        </thead>
                        <tbody id="clientes-grid">
                            <!-- Linhas injetadas aqui -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Detalhes -->
    <div class="modal-overlay" id="modal-detalhes">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-nome-cliente">Detalhes do Cliente</h2>
                <button class="modal-close" onclick="fecharModal('modal-detalhes')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div style="display: flex; gap: 20px; margin-bottom: 20px; align-items: center; background: #f8fafc; padding: 15px; border-radius: 10px;">
                    <div>
                        <div style="font-size: 0.8rem; color: #64748b; font-weight: 600; text-transform: uppercase;">Contato</div>
                        <div id="modal-wpp-cliente" style="font-size: 1.1rem; font-weight: 500; color: #1e293b;">-</div>
                    </div>
                    <a href="#" id="modal-wpp-link" target="_blank" style="background: #25D366; color: white; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;"><i class="fab fa-whatsapp"></i> Conversar</a>
                </div>

                <h3 style="font-size: 1.1rem; color: #334155; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 15px;">Histórico de Pedidos</h3>
                <ul class="historico-list" id="historico-list">
                    <!-- Lista de pedidos -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Modal Novo Cliente -->
    <div class="modal-overlay" id="modal-novo-cliente">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h2>Novo Cliente</h2>
                <button class="modal-close" onclick="fecharModal('modal-novo-cliente')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="form-novo-cliente" onsubmit="salvarNovoCliente(event)">
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 5px;">Nome Completo</label>
                        <input type="text" id="novo-nome" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 5px;">WhatsApp (com DDD)</label>
                        <input type="text" id="novo-wpp" required placeholder="Ex: 28999998888" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                    </div>
                    <button type="submit" style="width: 100%; background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;">Cadastrar Cliente</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Gerenciar Segmentos -->
    <div class="modal-overlay" id="modal-segmentos">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Gerenciar Segmentos</h2>
                <button class="modal-close" onclick="fecharModal('modal-segmentos')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #f1f5f9;">
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="input-novo-segmento" placeholder="Novo segmento (ex: Farmácia)" style="flex: 1; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px;">
                        <button onclick="criarSegmento()" style="background: #10b981; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 600; cursor: pointer;">Criar</button>
                    </div>
                </div>
                <div id="lista-segmentos-gestao" style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- Lista de segmentos aqui -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Aplicar Tag -->
    <div class="modal-overlay" id="modal-aplicar-tag">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h2>Aplicar Segmentos</h2>
                <button class="modal-close" onclick="fecharModal('modal-aplicar-tag')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 15px;">Selecione os segmentos para <strong id="tag-nome-cliente">...</strong></p>
                <div id="lista-tags-disponiveis" style="display: flex; flex-direction: column; gap: 8px;">
                    <!-- Checkboxes de tags -->
                </div>
                <button onclick="fecharModal('modal-aplicar-tag')" style="width: 100%; margin-top: 20px; background: #f1f5f9; color: #475569; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer;">Concluído</button>
            </div>
        </div>
    </div>

    <!-- Modal Editar Cliente -->
    <div class="modal-overlay" id="modal-editar-cliente">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h2>Editar Cliente</h2>
                <button class="modal-close" onclick="fecharModal('modal-editar-cliente')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="form-editar-cliente" onsubmit="salvarEdicaoCliente(event)">
                    <input type="hidden" id="editar-wpp-original">
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 5px;">Nome Completo</label>
                        <input type="text" id="editar-nome" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 5px;">WhatsApp (com DDD)</label>
                        <input type="text" id="editar-wpp" required placeholder="Ex: 28999998888" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;">
                    </div>
                    <button type="submit" style="width: 100%; background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;">
                        <i class="fas fa-save"></i> Salvar Alterações
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="/layout.js"></script>
    <script src="/clientes-script.js"></script>
</body>
</html>
