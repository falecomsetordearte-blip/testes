<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Dados — Indoor</title>
    <link rel="icon" type="image/svg+xml" href="/images/logo-fundo-claro-100x100.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/indoor/style.css">
    <link rel="stylesheet" href="/style.css"> <!-- Para estilos de form do main -->
    
    <style>
        .profile-card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
            max-width: 900px;
            margin: 0 auto;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }

        .logo-preview-container {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 25px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #dee2e6;
            margin-bottom: 25px;
        }
        
        .current-logo-wrapper {
            position: relative;
            width: 100px; height: 100px;
            background: white;
            border-radius: 50%;
            border: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .current-logo { width: 100%; height: 100%; object-fit: cover; }
        .logo-upload-info h4 { margin: 0 0 5px 0; font-size: 1.1rem; color: #334155; }
        .logo-upload-info p { margin: 0 0 10px 0; font-size: 0.9rem; color: #64748b; }
        input[type="file"] { font-size: 0.9rem; color: #64748b; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .logo-preview-container { flex-direction: column; text-align: center; }
        }
        
        /* Resetando h2 que vem do style.css e sobrepõe o indoor */
        .pedidos-header-bar h2 { margin: 0; font-size: 1.5rem; color:#1e293b; }
        .pedidos-header-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;}
    </style>
</head>
<body>
    <div class="indoor-layout">
        <div id="indoor-sidebar-placeholder"></div>
        <div class="indoor-content-area">
            <div id="indoor-header-placeholder"></div>
            
            <main class="indoor-main" style="padding: 30px;">
                <div class="pedidos-header-bar">
                    <h2><i class="fas fa-user-cog" style="color:#14b8a6;"></i> Meus Dados</h2>
                </div>

                <div class="profile-card">
                    <div id="form-feedback" class="form-feedback hidden"></div>

                    <form id="profile-form">
                        <div class="logo-preview-container">
                            <div class="current-logo-wrapper">
                                <img src="/images/logo-fundo-claro-100x100.png" alt="Logo Atual" id="current-logo-img" class="current-logo">
                            </div>
                            <div class="logo-upload-info">
                                <h4>Logo da Empresa</h4>
                                <p>Esta imagem aparecerá nos Grupos de WhatsApp que o Sistema criar.</p>
                                <input type="file" id="new-logo-file" accept="image/*">
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group full-width">
                                <label for="nome_fantasia">Nome da Empresa</label>
                                <input type="text" id="nome_fantasia" required>
                            </div>

                            <div class="form-group">
                                <label for="cnpj">CNPJ</label>
                                <input type="text" id="cnpj" disabled style="background-color: #e9ecef; cursor: not-allowed;">
                            </div>

                            <div class="form-group">
                                <label for="whatsapp">WhatsApp / Telefone</label>
                                <input type="text" id="whatsapp" required>
                            </div>

                            <div class="form-group full-width">
                                <label for="responsavel">Nome do Responsável</label>
                                <input type="text" id="responsavel" required>
                            </div>

                            <div class="form-group full-width">
                                <label for="email">E-mail de Login</label>
                                <input type="email" id="email" required>
                            </div>

                            <div class="form-group">
                                <label for="new_password">Nova Senha (Opcional)</label>
                                <input type="password" id="new_password" placeholder="Deixe vazio para manter">
                            </div>
                            <div class="form-group">
                                <label for="confirm_password">Confirmar Nova Senha</label>
                                <input type="password" id="confirm_password" placeholder="Repita a nova senha">
                            </div>
                        </div>

                        <div style="margin-top: 30px;">
                            <button type="submit" class="btn btn-primary btn-lg w-100" id="btn-submit" style="background:#14b8a6; border:none; width:100%; padding:15px; border-radius:8px; color:#fff; font-weight:bold; cursor:pointer;">
                                Salvar Alterações
                            </button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/indoor/layout.js"></script>
    <script src="https://unpkg.com/imask"></script>
    <script src="/meus-dados-script.js"></script>
</body>
</html>
