<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Indoor — Setor de Arte</title>
    <link rel="icon" href="/images/logo-fundo-claro-100x100.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/indoor/style.css?v=4">
</head>
<body>
    <div class="indoor-layout">
        <div id="indoor-sidebar-placeholder"></div>
        <div class="indoor-content-area">
            <div id="indoor-header-placeholder"></div>
            <main class="indoor-main">

                <div class="in-page-title">
                    <h2><i class="fas fa-th-large" style="color:#14b8a6;"></i> Kanban Indoor</h2>
                    <button onclick="window.abrirDrawerNovoPedido && window.abrirDrawerNovoPedido()" class="in-btn-action" style="border:none;cursor:pointer;">
                        <i class="fas fa-plus"></i> Novo Pedido
                    </button>
                </div>

                <div class="indoor-kanban" id="kanban-board">
                    <!-- Coluna: Aguardando Pagamento -->
                    <div class="in-kanban-col">
                        <div class="in-kanban-col-header aguardando">
                            <span><i class="fas fa-clock"></i> Aguardando Pgto.</span>
                            <span class="in-kanban-count" id="count-aguardando">0</span>
                        </div>
                        <div class="in-kanban-items" id="col-aguardando"></div>
                    </div>

                    <!-- Coluna: Em Edição -->
                    <div class="in-kanban-col">
                        <div class="in-kanban-col-header edicao">
                            <span><i class="fas fa-pencil-alt"></i> Em Edição</span>
                            <span class="in-kanban-count" id="count-edicao">0</span>
                        </div>
                        <div class="in-kanban-items" id="col-edicao"></div>
                    </div>

                    <!-- Coluna: Veicular -->
                    <div class="in-kanban-col">
                        <div class="in-kanban-col-header veicular">
                            <span><i class="fas fa-broadcast-tower"></i> Veicular</span>
                            <span class="in-kanban-count" id="count-veicular">0</span>
                        </div>
                        <div class="in-kanban-items" id="col-veicular"></div>
                    </div>
                    
                    <!-- Coluna: Veiculando -->
                    <div class="in-kanban-col">
                        <div class="in-kanban-col-header veiculando">
                            <span title="Airing"><i class="fas fa-play-circle" style="margin-right:6px;"></i> Veiculando</span>
                            <span class="in-kanban-count" id="count-veiculando">0</span>
                        </div>
                        <div class="in-kanban-items" id="col-veiculando"></div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="/indoor/layout.js"></script>
    <script>
        const FORMATO_ICON = { deitado: '📺', empo: '📱', quadrado: '⬛' };
        const FORMATO_LABEL = { deitado: 'Deitado', empo: 'Em Pé', quadrado: 'Quadrado' };
        let kanbanCache = {};

        window.carregarDashboard = async function() {
            const token = localStorage.getItem('sessionToken');
            if (!token) { window.location.href = '/indoor/login.html'; return; }

            console.log('[Indoor-Dashboard] Carregando Kanban...');

            ['col-aguardando','col-edicao','col-veicular','col-veiculando'].forEach(id => {
                document.getElementById(id).innerHTML = '<div class="in-card-empty"><i class="fas fa-spinner fa-spin"></i></div>';
            });

            try {
                const res = await fetch('/api/indoor/listar-kanban', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionToken: token })
                });
                if (res.status === 401 || res.status === 403) { window.location.href = '/indoor/login.html'; return; }
                const data = await res.json();
                kanbanCache = data.kanban || {};
                renderKanban(kanbanCache);
            } catch (err) {
                console.error('[Indoor-Dashboard] Erro:', err);
            }
        };

        function renderKanban(kanban) {
            renderCol('col-aguardando', 'count-aguardando', kanban['AGUARDANDO PAGAMENTO'] || [], true, false, false);
            renderCol('col-edicao', 'count-edicao', kanban['EM EDIÇÃO'] || [], false, true, false);
            renderCol('col-veicular', 'count-veicular', kanban['VEICULAR'] || [], false, false, true);
            renderCol('col-veiculando', 'count-veiculando', kanban['VEICULANDO'] || [], false, false, false);
        }

        function renderCol(colId, countId, pedidos, showProduzir, showVeicular, showConcluir) {
            const col = document.getElementById(colId);
            document.getElementById(countId).textContent = pedidos.length;

            if (pedidos.length === 0) {
                col.innerHTML = '<div class="in-card-empty"><i class="fas fa-inbox"></i><br>Nenhum pedido aqui</div>';
                return;
            }

            col.innerHTML = '';
            pedidos.forEach(p => {
                const card = document.createElement('div');
                card.className = 'in-kanban-card';
                const valor = p.valor ? `R$ ${parseFloat(p.valor).toFixed(2).replace('.',',')}` : '';
                const formatoIcon = FORMATO_ICON[p.formato] || '🎬';
                const formatoLabel = FORMATO_LABEL[p.formato] || p.formato;
                const duracao = p.duracao ? `${p.duracao}s` : '';

                card.innerHTML = `
                    <div class="in-card-title">${p.titulo}</div>
                    <div class="in-card-client"><i class="fas fa-user" style="color:#cbd5e1;"></i> ${p.nome_cliente || '—'}</div>
                    <div class="in-card-meta">
                        ${p.formato ? `<span>${formatoIcon} ${formatoLabel}</span>` : ''}
                        ${duracao ? `<span>⏱ ${duracao}</span>` : ''}
                    </div>
                    ${valor ? `<div class="in-card-price">${valor}</div>` : ''}
                    <div class="in-card-actions">
                        ${p.link_video_aprovado ? `
                            <a href="${p.link_video_aprovado}" target="_blank" class="in-btn-produzir" style="background:#3b82f6; color:#fff; text-decoration:none;">
                                <i class="fas fa-download" style="margin-right:6px;"></i> BAIXAR ARTE
                            </a>
                        ` : ''}
                        ${showProduzir ? `<button class="in-btn-produzir" data-confirming="false" onclick="handleProduzir(${p.id}, this)"><i class="fas fa-rocket"></i> PRODUZIR</button>` : ''}
                        ${showVeicular ? `<button class="in-btn-produzir" style="background:#0ea5e9; color:#fff;" onclick="moverParaVeicular(${p.id}, this)"><i class="fas fa-broadcast-tower"></i> VEICULAR</button>` : ''}
                        ${showConcluir ? `<button class="in-btn-produzir" style="background:#10b981; color:#fff;" onclick="moverParaVeiculando(${p.id}, this)"><i class="fas fa-check-circle"></i> CONCLUIR</button>` : ''}
                    </div>
                    <button class="in-btn-card-del" onclick="excluirCard(${p.id})" title="Excluir"><i class="fas fa-trash-alt"></i></button>
                `;
                col.appendChild(card);
            });
        }

        window.handleProduzir = function(pedidoId, btn) {
            if (btn.dataset.confirming === 'true') {
                produzir(pedidoId, btn);
            } else {
                btn.dataset.confirming = 'true';
                btn.classList.add('confirm-state');
                btn.innerHTML = '<i class="fas fa-exclamation"></i> Confirmar?';
                setTimeout(() => {
                    if (btn.dataset.confirming === 'true') {
                        btn.dataset.confirming = 'false';
                        btn.classList.remove('confirm-state');
                        btn.innerHTML = '<i class="fas fa-rocket"></i> PRODUZIR';
                    }
                }, 3500);
            }
        };

        window.moverParaVeicular = async function(pedidoId, btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Movendo...';

            try {
                const res = await fetch('/api/indoor/mover-etapa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionToken: localStorage.getItem('sessionToken'),
                        id: pedidoId,
                        etapaAtual: 'EM EDIÇÃO'
                    })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    window.carregarDashboard();
                } else {
                    throw new Error(data.message || 'Erro ao mover pedido.');
                }
            } catch (err) {
                console.error('[Indoor-Dashboard] Erro ao mover:', err);
                window.indoorDialog({ type: 'alert', title: 'Erro', message: err.message });
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-broadcast-tower"></i> VEICULAR';
            }
        };

        window.moverParaVeiculando = async function(pedidoId, btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Movendo...';

            try {
                const res = await fetch('/api/indoor/mover-etapa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionToken: localStorage.getItem('sessionToken'),
                        id: pedidoId,
                        etapaAtual: 'VEICULAR'
                    })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    window.carregarDashboard();
                } else {
                    throw new Error(data.message || 'Erro ao mover pedido.');
                }
            } catch (err) {
                console.error('[Indoor-Dashboard] Erro ao mover para veiculando:', err);
                window.indoorDialog({ type: 'alert', title: 'Erro', message: err.message });
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> CONCLUIR';
            }
        };

        async function produzir(pedidoId, btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gerando...';

            try {
                const res = await fetch('/api/indoor/gerar-cobranca', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionToken: localStorage.getItem('sessionToken'),
                        pedidoId
                    })
                });
                const data = await res.json();

                if (res.ok && data.url) {
                    console.log(`[Indoor-Dashboard] Cobrança gerada. Abrindo: ${data.url}`);
                    window.open(data.url, '_blank');
                    btn.innerHTML = '<i class="fas fa-check"></i> Aguardando Pgto.';
                } else {
                    throw new Error(data.message || 'Erro ao gerar cobrança.');
                }
            } catch (err) {
                console.error('[Indoor-Dashboard] Erro produzir:', err);
                window.indoorDialog({ type: 'alert', title: 'Erro', message: err.message });
                btn.disabled = false;
                btn.dataset.confirming = 'false';
                btn.classList.remove('confirm-state');
                btn.innerHTML = '<i class="fas fa-rocket"></i> PRODUZIR';
            }
        }

        window.excluirCard = function(pedidoId) {
            window.indoorDialog({
                type: 'confirm',
                title: 'Excluir Pedido',
                message: 'Deseja realmente excluir este pedido? Esta ação é permanente.',
                okText: 'Excluir',
                onConfirm: async () => {
                    try {
                        // Reutiliza a API mover-etapa com etapa especial CANCELADO
                        await fetch('/api/indoor/mover-etapa', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                sessionToken: localStorage.getItem('sessionToken'),
                                id: pedidoId,
                                etapaAtual: '_DELETE_'
                            })
                        });
                        window.carregarDashboard();
                    } catch(e) {
                        window.indoorDialog({ type: 'alert', title: 'Erro', message: 'Erro ao excluir.' });
                    }
                }
            });
        };

        document.addEventListener('DOMContentLoaded', window.carregarDashboard);
    </script>
</body>
</html>
