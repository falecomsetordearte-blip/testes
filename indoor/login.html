<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Indoor | Setor de Arte</title>
    <link rel="icon" href="/images/logo-fundo-claro-100x100.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/indoor/style.css">
</head>
<body>
    <div class="in-auth-page">
        <div class="in-auth-card">
            <div class="in-auth-logo">
                <img src="/images/logo-fundo-claro-100x100.png" alt="Setor de Arte">
                <div class="in-auth-badge">Indoor</div>
            </div>
            <h1 class="in-auth-title">Bem-vindo(a) de volta</h1>
            <p class="in-auth-subtitle">Acesse o painel de comunicação visual indoor</p>

            <div id="feedback" class="in-feedback"></div>

            <form id="login-form">
                <div class="in-form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                </div>
                <div class="in-form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="in-btn-submit" id="btn-submit">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>

            <div style="text-align:center; margin-top:24px; font-size:0.9rem; color:#64748b; border-top: 1px solid #e2e8f0; padding-top: 20px;">
                Não possui uma conta? <br>
                <a href="cadastro.html" style="color:#14b8a6; text-decoration:none; font-weight:700; font-size: 1rem; display: block; margin-top: 8px;">
                    <i class="fas fa-user-plus"></i> Cadastre-se Grátis
                </a>
            </div>
        </div>
    </div>

    <script>
        // Se já está logado, redireciona direto
        if (localStorage.getItem('sessionToken')) {
            window.location.href = '/indoor/dashboard.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const feedback = document.getElementById('feedback');
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
            feedback.className = 'in-feedback';
            feedback.textContent = '';

            try {
                const res = await fetch('/api/loginUser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.message || 'Erro ao fazer login.');

                localStorage.setItem('sessionToken', data.token);
                localStorage.setItem('userName', data.userName);
                if (data.permissoes) localStorage.setItem('userPermissoes', JSON.stringify(data.permissoes));

                console.log('[Indoor-Login] Login realizado com sucesso. Redirecionando...');
                window.location.href = '/indoor/dashboard.html';

            } catch (err) {
                feedback.textContent = err.message;
                feedback.className = 'in-feedback error';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
            }
        });
    </script>
</body>
</html>
