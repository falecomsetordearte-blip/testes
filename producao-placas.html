<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinaliza - Dashboard de Produção Unificado</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfdfd;
            --card-bg: #ffffff;
            --primary: #f97316;
            /* Laranja */
            --secondary: #eab308;
            /* Amarelo */
            --success: #16a34a;
            --danger: #dc2626;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-dim: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 1rem;
        }

        .title-group h1 {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 800;
            letter-spacing: -1px;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: #fee2e2;
            color: var(--danger);
            border: 1px solid #fecaca;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* GRID PRINCIPAL */
        .grid-board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
            padding-bottom: 5rem;
        }

        /* CARD DE PRODUTO UNIFICADO */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
        }

        .plate-name-hero {
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            color: #0f172a;
            line-height: 1.2;
            text-transform: uppercase;
        }

        /* BARRA DE PROGRESSO GLOBAL NO CARD */
        .global-progress {
            background: #f1f5f9;
            height: 14px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-top: -0.5rem;
        }

        .global-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* LINHA DE ETAPA (IMPRESSÃO, REFILAR, COLAR) */
        .step-section {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        .step-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px dashed var(--border);
        }

        .step-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .step-label {
            font-weight: 800;
            font-size: 0.9rem;
            color: #475569;
            width: 100px;
            text-transform: uppercase;
        }

        .step-status {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dim);
        }

        .step-status span {
            color: var(--primary);
            font-weight: 800;
        }

        .step-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .step-input-group {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .step-input-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .compact-input {
            width: 55px;
            height: 35px;
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            text-align: center;
            font-weight: 800;
            color: var(--text-main);
        }

        .compact-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .btn-ok {
            width: 35px;
            height: 35px;
            padding: 0;
            background: var(--primary);
            color: white;
            font-weight: 800;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        /* ÁREA DE RE-IMPRESSÃO */
        .re-section {
            margin-top: 3rem;
            padding: 2rem;
            background: #fff5f0;
            border-radius: 20px;
            border: 2px dashed #fdba74;
        }

        .re-header {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--danger);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .re-text-area {
            width: 100%;
            height: 120px;
            background: white;
            border: 1px solid #fdba74;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            resize: none;
            margin-bottom: 1rem;
        }

        @media (max-width: 600px) {
            .grid-board {
                grid-template-columns: 1fr;
            }

            body {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="title-group">
            <h1>SINALIZA Dashboard</h1>
            <p style="color: var(--text-dim); font-size: 1rem;">Fluxo Único de Produção por Peça</p>
        </div>
        <div class="actions">
            <button class="btn btn-danger" onclick="resetData()">Zerar Tudo</button>
        </div>
    </header>

    <div class="grid-board" id="main-grid">
        <!-- Cards de produtos serão inseridos aqui -->
    </div>

    <div class="re-section">
        <div class="re-header">⚠️ Re-impressões e Observações</div>
        <textarea class="re-text-area" id="re-text"
            placeholder="Anote aqui quais placas precisam ser refeitas ou detalhes técnicos de re-impressão..."></textarea>
        <button class="btn btn-primary" onclick="saveRe()">Salvar Observações</button>
        <div id="saved-re"
            style="margin-top:1rem; font-size:1.1rem; color: #475569; white-space: pre-wrap; font-weight: 500;"></div>
    </div>

    <script>
        const INITIAL_DATA = [
            { id: 1, name: "ATENÇÃO A 1000 METROS", total: 10 },
            { id: 2, name: "ATENÇÃO A 1500 METROS", total: 10 },
            { id: 3, name: "ATENÇÃO HOMENS TRABALHANDO", total: 10 },
            { id: 4, name: "ATENÇÃO TRECHO EM OBRAS", total: 10 },
            { id: 5, name: "FIM DE OBRAS", total: 10 },
            { id: 6, name: "INÍCIO DAS OBRAS", total: 15 },
            { id: 7, name: "TRAFÉGO EM MEIA PISTA À 700 M", total: 20 },
            { id: 8, name: "TRAFÉGO EM MEIA PISTA À 500 M", total: 20 },
            { id: 9, name: "ATENÇÃO OBEDEÇA O OPERADOR", total: 20 },
            { id: 10, name: "ATENÇÃO PARE À 100 M", total: 20 },
            { id: 11, name: "ATENÇÃO PARE À 200 M", total: 20 },
            { id: 12, name: "60 KM/H", total: 20 },
            { id: 13, name: "40 KM/H", total: 20 },
            { id: 14, name: "PROIBIDO ULTRAPASSAR", total: 20 }
        ];

        let state = {
            impressao: {},
            refilar: {},
            colar: {},
            reimpressao: { text: "" }
        };

        function init() {
            const saved = localStorage.getItem('placa_tracker_v4');
            if (saved) {
                state = JSON.parse(saved);
            }
            render();
        }

        function save() {
            localStorage.setItem('placa_tracker_v4', JSON.stringify(state));
        }

        window.updateCount = (step, id, delta) => {
            const current = state[step][id] || 0;
            const plate = INITIAL_DATA.find(p => p.id === id);

            let newValue = current + delta;
            if (newValue < 0) newValue = 0;
            if (newValue > plate.total) newValue = plate.total;

            state[step][id] = newValue;
            save();
            render();
        };

        function createCard(plate) {
            const steps = [
                { key: 'impressao', label: 'Impressão' },
                { key: 'refilar', label: 'Refilar' },
                { key: 'colar', label: 'Colar' }
            ];

            // Cálculo do progresso global (soma das etapas / total de ações possíveis)
            const currentTotal = steps.reduce((sum, s) => sum + (state[s.key][plate.id] || 0), 0);
            const maxTotal = plate.total * steps.length;
            const globalPercent = (currentTotal / maxTotal) * 100;

            const card = document.createElement('div');
            card.className = `card`;

            let stepsHTML = '';
            steps.forEach(s => {
                const count = state[s.key][plate.id] || 0;
                const remaining = plate.total - count;
                stepsHTML += `
                <div class="step-row">
                    <div class="step-label">${s.label}</div>
                    <div class="step-status">Faltam: <span>${remaining}</span></div>
                    <div class="step-controls">
                        <div class="step-input-group">
                            <label>Fiz</label>
                            <input type="number" class="compact-input" id="input-${s.key}-${plate.id}" onkeyup="if(event.key === 'Enter') handleProduce('${s.key}', ${plate.id})">
                            <button class="btn-ok" onclick="handleProduce('${s.key}', ${plate.id})">OK</button>
                        </div>
                    </div>
                </div>
            `;
            });

            card.innerHTML = `
            <div class="plate-name-hero">${plate.name}</div>
            <div class="global-progress">
                <div class="global-progress-fill" style="width: ${globalPercent}%"></div>
            </div>
            <div class="step-section">
                ${stepsHTML}
            </div>
        `;
            return card;
        }

        window.handleProduce = (step, id) => {
            const input = document.getElementById(`input-${step}-${id}`);
            const val = parseInt(input.value);
            if (!isNaN(val) && val > 0) {
                updateCount(step, id, val);
            }
            input.value = ''; // Limpa o campo após ok
            input.focus(); // Mantém o foco
        };

        function render() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            INITIAL_DATA.forEach(plate => {
                grid.appendChild(createCard(plate));
            });

            const reTextArea = document.getElementById('re-text');
            const reDisplay = document.getElementById('saved-re');
            const savedText = state.reimpressao.text || "";
            reTextArea.value = savedText;
            reDisplay.textContent = savedText;
        }

        window.saveRe = () => {
            state.reimpressao.text = document.getElementById('re-text').value;
            save();
            render();
        };

        window.resetData = () => {
            if (confirm('Atenção: Isso zerará todo o progresso de todas as etapas. Deseja continuar?')) {
                state = { impressao: {}, refilar: {}, colar: {}, reimpressao: { text: "" } };
                save();
                render();
            }
        };

        init();
    </script>

</body>

</html>};

        init();
    </script>

</body>

</html>
