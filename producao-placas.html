<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produção de Placas - Kanban Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --header-bg: rgba(15, 23, 42, 0.8);
            --accent-color: #38bdf8;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --column-bg: rgba(15, 23, 42, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: auto;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
        }

        header {
            padding: 2rem;
            text-align: center;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kanban-container {
            display: flex;
            gap: 1.5rem;
            padding: 2rem;
            min-width: 1200px;
            align-items: flex-start;
        }

        .column {
            flex: 1;
            background: var(--column-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 1rem;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .column-header {
            padding: 0.5rem 1rem;
            border-bottom: 2px solid var(--accent-color);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .column-title {
            text-transform: uppercase;
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: 0.1em;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            border-radius: 0.5rem;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            line-height: 1.2;
            height: 2.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .status-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: rgba(0,0,0,0.2);
            border-radius: 0.5rem;
        }

        .faltam-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .faltam-count {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        .producer-input {
            flex: 1;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.4rem;
            padding: 0.5rem;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .producer-input:focus {
            border-color: var(--accent-color);
        }

        .btn-confirm {
            background: var(--success);
            color: white;
            border: none;
            padding: 0.5rem 0.75rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-confirm:hover {
            opacity: 0.8;
        }

        .btn-reset {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.25rem 0.5rem;
            font-size: 0.7rem;
            border-radius: 0.3rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-reset:hover {
            background: var(--danger);
            color: white;
        }

        /* Especifico para Re-impressão */
        .reprint-notes {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.4rem;
            padding: 0.5rem;
            color: #ccc;
            font-size: 0.8rem;
            resize: none;
            margin-bottom: 0.5rem;
        }

        .reprint-notes:focus {
            border-color: var(--danger);
            color: white;
        }

        .badge-done {
            background: var(--success);
            color: white;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>PRODUÇÃO DE PLACAS - ARTE</h1>
    <button class="btn-reset" onclick="resetFactorySettings()">REINICIAR TUDO</button>
</header>

<div class="kanban-container">
    <!-- ADESIVO -->
    <div class="column" id="col-adesivo">
        <div class="column-header">
            <span class="column-title">1. Adesivo</span>
        </div>
        <div class="card-list" id="list-adesivo"></div>
    </div>

    <!-- REFILAR -->
    <div class="column" id="col-refilar">
        <div class="column-header">
            <span class="column-title">2. Refilar</span>
        </div>
        <div class="card-list" id="list-refilar"></div>
    </div>

    <!-- COLAR -->
    <div class="column" id="col-colar">
        <div class="column-header">
            <span class="column-title">3. Colar</span>
        </div>
        <div class="card-list" id="list-colar"></div>
    </div>

    <!-- RE-IMPRESSÃO -->
    <div class="column" id="col-reimpressao">
        <div class="column-header">
            <span class="column-title" style="color: var(--danger);">Re-impressão</span>
        </div>
        <div class="card-list" id="list-reimpressao"></div>
    </div>
</div>

        IMG_9: "https://placehold.co/400x300/1e293b/38bdf8?text=OBEDEÇA",
        IMG_10: "https://placehold.co/400x300/1e293b/38bdf8?text=PARE+100",
        IMG_11: "https://placehold.co/400x300/1e293b/38bdf8?text=PARE+200",

        IMG_14: "https://placehold.co/400x300/1e293b/38bdf8?text=PROIBIDO"
    };

    const INITIAL_DATA = [
        { id: 1, name: "ATENÇÃO A 1000 METROS", total: 10, imgKey: "IMG_1" },
        { id: 2, name: "ATENÇÃO A 1500 METROS", total: 10, imgKey: "IMG_2" },
        { id: 3, name: "ATENÇÃO HOMENS TRABALHANDO", total: 10, imgKey: "IMG_3" },
        { id: 4, name: "ATENÇÃO TRECHO EM OBRAS", total: 10, imgKey: "IMG_4" },
        { id: 5, name: "FIM DE OBRAS", total: 10, imgKey: "IMG_5" },
        { id: 6, name: "INÍCIO DAS OBRAS", total: 15, imgKey: "IMG_6" },
        { id: 7, name: "TRAFÉGO EM MEIA PISTA À 700 M", total: 20, imgKey: "IMG_7" },
        { id: 8, name: "TRAFÉGO EM MEIA PISTA À 500 M", total: 20, imgKey: "IMG_8" },
        { id: 9, name: "ATENÇÃO OBEDEÇA O OPERADOR", total: 20, imgKey: "IMG_9" },
        { id: 10, name: "ATENÇÃO PARE À 100 M", total: 20, imgKey: "IMG_10" },
        { id: 11, name: "ATENÇÃO PARE À 200 M", total: 20, imgKey: "IMG_11" },
        { id: 12, name: "60KM/H", total: 20, imgKey: "IMG_12" },
        { id: 13, name: "40KM/H", total: 20, imgKey: "IMG_13" },
        { id: 14, name: "SIMBOLO PROIBIDO ULTRAPASSAR", total: 20, imgKey: "IMG_14" }
    ];

    let state = {
        adesivo: {},
        refilar: {},
        colar: {},
        reimpressao: {}
    };

    function init() {
        const stored = localStorage.getItem('placa_tracker_v1');
        if (stored) {
            state = JSON.parse(stored);
        } else {
            // Inicializa todos com o total
            INITIAL_DATA.forEach(p => {
                state.adesivo[p.id] = p.total;
                state.refilar[p.id] = p.total;
                state.colar[p.id] = p.total;
                state.reimpressao[p.id] = { count: 0, notes: "" };
            });
            save();
        }
        render();
    }

    function save() {
        localStorage.setItem('placa_tracker_v1', JSON.stringify(state));
    }

    function updateCount(column, id, val) {
        const input = document.getElementById(`input-${column}-${id}`);
        const produced = parseInt(input.value);
        if (isNaN(produced) || produced <= 0) return;

        if (column === 'reimpressao') {
            state[column][id].count += produced;
        } else {
            state[column][id] = Math.max(0, state[column][id] - produced);
        }
        
        input.value = "";
        save();
        render();
    }

    function updateNote(id, val) {
        state.reimpressao[id].notes = val;
        save();
    }

    function render() {
        const columns = ['adesivo', 'refilar', 'colar', 'reimpressao'];
        
        columns.forEach(col => {
            const list = document.getElementById(`list-${col}`);
            list.innerHTML = "";
            
            INITIAL_DATA.forEach(p => {
                const count = col === 'reimpressao' ? state[col][p.id].count : state[col][p.id];
                const isReimpressao = col === 'reimpressao';
                
                const card = document.createElement('div');
                card.className = 'card';
                if (count === 0 && !isReimpressao) card.style.opacity = "0.5";

                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <span class="card-title">${p.name}</span>
                        ${(count === 0 && !isReimpressao) ? '<span class="badge-done">OK</span>' : ''}
                    </div>
                    <img src="${IMG_MAP[p.imgKey]}" alt="${p.name}">
                    
                    <div class="status-container">
                        <span class="faltam-label">${isReimpressao ? 'Solicitados' : 'Faltam'}</span>
                        <span class="faltam-count">${count}</span>
                    </div>

                    ${isReimpressao ? `<textarea class="reprint-notes" placeholder="Motivo/Obs..." onchange="updateNote(${p.id}, this.value)">${state[col][p.id].notes}</textarea>` : ''}

                    <div class="input-group">
                        <input type="number" class="producer-input" id="input-${col}-${p.id}" placeholder="${isReimpressao ? 'Pedir...' : 'Fiz...'}" min="1">
                        <button class="btn-confirm" onclick="updateCount('${col}', ${p.id})">v</button>
                    </div>
                `;
                list.appendChild(card);
            });
        });
    }

    function resetFactorySettings() {
        if (confirm("Deseja realmente resetar toda a produção? Isso apagará os dados salvos.")) {
            localStorage.removeItem('placa_tracker_v1');
            location.reload();
        }
    }

    init();
</script>
