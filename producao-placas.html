<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinaliza - Dashboard de Produção</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --border: rgba(255,255,255,0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .title-group h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: #000; }
        .btn-danger { background: var(--danger); color: white; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }

        .kanban-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            align-items: start;
        }

        .column {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            min-height: 80vh;
        }

        .column-header {
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary);
        }

        .column-title {
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .card.done {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.05);
            opacity: 0.8;
        }

        .plate-name-hero {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            color: white;
            line-height: 1.1;
            padding: 1rem 0;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .card-info {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.8rem;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            font-size: 1.1rem;
        }

        .card-info span { color: var(--text-dim); }
        .card-info strong { color: var(--primary); margin: 0 5px; font-size: 1.4rem; }
        .card.done strong { color: var(--success); }

        .card-controls {
            display: flex;
            gap: 0.5rem;
        }

        .compact-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            padding: 0.8rem;
            font-size: 1.2rem;
            text-align: center;
            font-weight: 600;
        }

        .re-text-area {
            width: 100%;
            height: 150px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-size: 1rem;
            resize: none;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .kanban-board { grid-template-columns: 1fr; }
            .plate-name-hero { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="title-group">
        <h1>Painel de Produção - Kanban</h1>
        <p style="color: var(--text-dim); font-size: 0.9rem;">Controle em tempo real de placas e sinalização</p>
    </div>
    <div class="actions">
        <button class="btn btn-danger" onclick="resetData()">Zerar Tudo</button>
    </div>
</header>

<div class="kanban-board">
    <!-- ADESIVO -->
    <div class="column">
        <div class="column-header">
            <span class="column-title">1. Adesivo</span>
        </div>
        <div class="card-list" id="list-adesivo"></div>
    </div>

    <!-- REFILAR -->
    <div class="column">
        <div class="column-header">
            <span class="column-title">2. Refilar</span>
        </div>
        <div class="card-list" id="list-refilar"></div>
    </div>

    <!-- COLAR -->
    <div class="column">
        <div class="column-header">
            <span class="column-title">3. Colar</span>
        </div>
        <div class="card-list" id="list-colar"></div>
    </div>

    <!-- RE-IMPRESSÃO -->
    <div class="column">
        <div class="column-header">
            <span class="column-title" style="color: var(--danger);">Re-impressão</span>
        </div>
        <div class="card-list" id="list-reimpressao">
            <div class="card">
                <textarea class="re-text-area" id="re-text" placeholder="Liste aqui as placas que precisam de re-imposição ou re-impressão..."></textarea>
                <button class="btn btn-primary" onclick="saveRe()">Salvar Observações</button>
                <div id="saved-re" style="margin-top:1rem; font-size:0.9rem; color: #94a3b8; white-space: pre-wrap;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const INITIAL_DATA = [
        { id: 1, name: "ATENÇÃO A 1000 METROS", total: 10 },
        { id: 2, name: "ATENÇÃO A 1500 METROS", total: 10 },
        { id: 3, name: "ATENÇÃO HOMENS TRABALHANDO", total: 10 },
        { id: 4, name: "ATENÇÃO TRECHO EM OBRAS", total: 10 },
        { id: 5, name: "FIM DE OBRAS", total: 10 },
        { id: 6, name: "INÍCIO DAS OBRAS", total: 15 },
        { id: 7, name: "TRAFÉGO EM MEIA PISTA À 700 M", total: 20 },
        { id: 8, name: "TRAFÉGO EM MEIA PISTA À 500 M", total: 20 },
        { id: 9, name: "ATENÇÃO OBEDEÇA O OPERADOR", total: 20 },
        { id: 10, name: "ATENÇÃO PARE À 100 M", total: 20 },
        { id: 11, name: "ATENÇÃO PARE À 200 M", total: 20 },
        { id: 12, name: "60 KM/H", total: 20 },
        { id: 13, name: "40 KM/H", total: 20 },
        { id: 14, name: "PROIBIDO ULTRAPASSAR", total: 20 }
    ];

    let state = {
        adesivo: {},
        refilar: {},
        colar: {},
        reimpressao: { text: "" }
    };

    function init() {
        const saved = localStorage.getItem('placa_tracker_v2');
        if (saved) {
            state = JSON.parse(saved);
        }
        render();
    }

    function save() {
        localStorage.setItem('placa_tracker_v2', JSON.stringify(state));
    }

    window.updateCount = (step, id, delta) => {
        const current = state[step][id] || 0;
        const plate = INITIAL_DATA.find(p => p.id === id);
        
        let newValue = current + delta;
        if (newValue < 0) newValue = 0;
        if (newValue > plate.total) newValue = plate.total;
        
        state[step][id] = newValue;
        save();
        render();
    };

    window.handleProduce = (step, id) => {
        const input = document.getElementById(`input-${step}-${id}`);
        const val = parseInt(input.value);
        if (!isNaN(val) && val > 0) {
            updateCount(step, id, val);
            input.value = '';
        }
    };

    function createCard(plate, step) {
        const count = state[step][plate.id] || 0;
        const remaining = plate.total - count;
        const isDone = remaining === 0;

        const card = document.createElement('div');
        card.className = `card ${isDone ? 'done' : ''}`;
        
        card.innerHTML = `
            <div class="plate-name-hero">${plate.name}</div>
            <div class="card-info">
                <span>Faltam: <strong>${remaining}</strong> / ${plate.total}</span>
            </div>
            <div class="card-controls">
                <input type="number" class="compact-input" placeholder="Qtde" id="input-${step}-${plate.id}">
                <button class="btn btn-primary" onclick="handleProduce('${step}', ${plate.id})">OK</button>
            </div>
        `;
        return card;
    }

    function render() {
        const columns = ['adesivo', 'refilar', 'colar'];
        columns.forEach(step => {
            const list = document.getElementById(`list-${step}`);
            list.innerHTML = '';
            INITIAL_DATA.forEach(plate => {
                list.appendChild(createCard(plate, step));
            });
        });

        const savedRe = state.reimpressao.text || "";
        document.getElementById('re-text').value = savedRe;
        document.getElementById('saved-re').textContent = savedRe;
    }

    window.saveRe = () => {
        state.reimpressao.text = document.getElementById('re-text').value;
        save();
        render();
    };

    window.resetData = () => {
        if(confirm('Isso apagará todo o progresso. Continuar?')) {
            state = { adesivo: {}, refilar: {}, colar: {}, reimpressao: { text: "" } };
            save();
            render();
        }
    };

    init();
</script>

</body>
</html>
